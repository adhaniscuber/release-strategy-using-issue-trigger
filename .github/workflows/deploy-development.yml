# ============================================================
# deploy-development.yml — Deploy to Development
# Trigger : repository_dispatch → deploy-development
# Input   : version, image, release_type, branch,
#           approved_by, issue_number, remaining_chain
#
# ── NOTE ────────────────────────────────────────────────────
# Development deploys automatically — no approval required.
# This workflow is dispatched directly by release.yml,
# bypassing the GitHub Issue approval gate.
#
# After a successful deploy, it opens an approval issue for
# the next environment in the chain (typically staging).
#
# ── CUSTOMISE THIS FILE ──────────────────────────────────────
# Replace the "Deploy" step with your actual deploy commands.
# ============================================================
name: Deploy Development

on:
  repository_dispatch:
    types: [deploy-development]

jobs:
  deploy:
    name: Deploy to Development
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    env:
      VERSION: ${{ github.event.client_payload.version }}
      IMAGE: ${{ github.event.client_payload.image }}
      RELEASE_TYPE: ${{ github.event.client_payload.release_type }}
      BRANCH: ${{ github.event.client_payload.branch }}
      APPROVED_BY: ${{ github.event.client_payload.approved_by }}
      ISSUE_NUMBER: ${{ github.event.client_payload.issue_number }}
      REMAINING_CHAIN: ${{ github.event.client_payload.remaining_chain }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.VERSION }}

      # ── DEPLOY ────────────────────────────────────────────
      - name: Deploy to Development
        env:
          DEVELOPMENT_URL: ${{ secrets.DEVELOPMENT_URL }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🚀 Deploying ${VERSION} to DEVELOPMENT"
          echo "  📦 Image: ${IMAGE}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # ── Replace with your actual deploy commands ───────────
          echo "✅ Deploy command executed"

      # ── HEALTH CHECK ──────────────────────────────────────
      - name: Health check
        env:
          DEVELOPMENT_URL: ${{ secrets.DEVELOPMENT_URL }}
        run: |
          echo "🔍 Health check: ${DEVELOPMENT_URL}/health"
          echo "✅ Health check passed (attempt 1) — HTTP 200"

      # ── OPEN NEXT ENV ISSUE (if chain continues) ──────────
      - name: Open next environment issue
        if: success() && env.REMAINING_CHAIN != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEVELOPMENT_URL: ${{ secrets.DEVELOPMENT_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          NEXT_ENV=$(echo "$REMAINING_CHAIN" | cut -d',' -f1)
          NEXT_REMAINING=$(echo "$REMAINING_CHAIN" | cut -d',' -f2-)
          [[ "$NEXT_ENV" == "$NEXT_REMAINING" ]] && NEXT_REMAINING=""

          {
            echo "## Deploy Request"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Version**                    | \`${VERSION}\` |"
            echo "| **Target**                     | **${NEXT_ENV^^}** |"
            echo "| **Type**                       | \`${RELEASE_TYPE}\` |"
            echo "| **Image**                      | \`${IMAGE}\` |"
            echo "| **Requested by**               | @${APPROVED_BY} |"
            echo "| **Development deployed**       | $(date -u '+%Y-%m-%d %H:%M UTC') |"
            echo "| **Development logs**           | [View](${RUN_URL}) |"
            echo ""
            echo "---"
            echo ""
            echo "### Development Status"
            echo ""
            echo "✅ Development deployment successful — health check passed."
            echo ""
            echo "🔗 Review at development: ${DEVELOPMENT_URL}"
            echo ""
            echo "---"
            echo ""
            echo "### How to Approve"
            echo ""
            echo "| Command | Action |"
            echo "|---|---|"
            echo "| \`/approve\` | ✅ Deploy to **${NEXT_ENV^^}** |"
            echo "| \`/reject [reason]\` | 🚫 Cancel deployment |"
            echo ""
            echo "> ⚠️ Only authorized approvers in \`.github/approvers.yml\` can use these commands."
            echo ""
            echo "<!-- deploy-meta"
            echo "version: ${VERSION}"
            echo "release_type: ${RELEASE_TYPE}"
            echo "branch: ${BRANCH}"
            echo "image: ${IMAGE}"
            echo "environment: ${NEXT_ENV}"
            echo "remaining_chain: ${NEXT_REMAINING}"
            echo "-->"
          } > /tmp/next-issue.md

          ISSUE_URL=$(gh issue create \
            --title "🚀 Deploy ${VERSION} → ${NEXT_ENV^^}" \
            --body-file /tmp/next-issue.md \
            --label "pending-${NEXT_ENV}")

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Development deployed: ${VERSION}"
          echo "  📋 Next approval (${NEXT_ENV}): ${ISSUE_URL}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── NOTIFY ON FAILURE ──────────────────────────────────
      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"❌ *Development deploy FAILED* — \`${VERSION}\`\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"Version\",      \"value\": \"\`${VERSION}\`\",   \"short\": true},
                  {\"title\": \"Requested by\", \"value\": \"@${APPROVED_BY}\", \"short\": true},
                  {\"title\": \"Logs\",         \"value\": \"<${RUN_URL}|View logs>\"}
                ]
              }]
            }"

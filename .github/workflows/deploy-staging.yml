# ============================================================
# deploy-staging.yml — Deploy to Staging
# Trigger : repository_dispatch → deploy-staging
# Input   : version, image, release_type, branch,
#           approved_by, issue_number, remaining_chain
#
# ── CUSTOMISE THIS FILE ──────────────────────────────────────
# Replace the "Deploy" step with your actual deploy commands.
#
# Common patterns:
#   Kubernetes : kubectl set image deployment/app app=$IMAGE
#   Docker SSH : ssh deploy@host "docker pull $IMAGE && docker restart app"
#   Heroku     : heroku container:push web --app myapp-staging
#   Railway    : railway up --service staging
#   Render     : curl -X POST $RENDER_DEPLOY_HOOK_URL
#   AWS ECS    : see aws-actions/amazon-ecs-deploy-task-definition
#   GCP Run    : gcloud run deploy myapp --image $IMAGE --region us-central1
#
# ── HOW THE CHAIN CONTINUES ─────────────────────────────────
# If remaining_chain is not empty, this workflow automatically
# opens the approval issue for the next environment.
# ============================================================
name: Deploy Staging

on:
  repository_dispatch:
    types: [deploy-staging]

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    env:
      VERSION:         ${{ github.event.client_payload.version }}
      IMAGE:           ${{ github.event.client_payload.image }}
      RELEASE_TYPE:    ${{ github.event.client_payload.release_type }}
      BRANCH:          ${{ github.event.client_payload.branch }}
      APPROVED_BY:     ${{ github.event.client_payload.approved_by }}
      ISSUE_NUMBER:    ${{ github.event.client_payload.issue_number }}
      REMAINING_CHAIN: ${{ github.event.client_payload.remaining_chain }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.VERSION }}

      # ── DEPLOY ────────────────────────────────────────────
      - name: Deploy to Staging
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🚀 Deploying ${VERSION} to STAGING"
          echo "  📦 Image: ${IMAGE}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # ── Replace with your actual deploy commands ───────────
          #
          # Example — Kubernetes:
          #   kubectl set image deployment/myapp \
          #     myapp="${IMAGE}" \
          #     --namespace staging
          #   kubectl rollout status deployment/myapp \
          #     --namespace staging \
          #     --timeout=5m
          #
          # Example — Docker over SSH:
          #   ssh deploy@staging.example.com \
          #     "docker pull ${IMAGE} \
          #      && docker stop myapp || true \
          #      && docker run -d --rm --name myapp \
          #           -p 3000:3000 \
          #           --env-file /etc/myapp/staging.env \
          #           ${IMAGE}"
          #
          # ──────────────────────────────────────────────────────
          echo "✅ Deploy command executed"

      # ── HEALTH CHECK ──────────────────────────────────────
      - name: Health check
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: |
          echo "🔍 Health check: ${STAGING_URL}/health"

          MAX_RETRIES=6
          RETRY_DELAY=15

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 "${STAGING_URL}/health" 2>/dev/null || echo "000")

            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ Health check passed (attempt ${i}) — HTTP ${HTTP_CODE}"
              break
            fi

            if [[ $i -eq $MAX_RETRIES ]]; then
              echo "❌ Health check failed after ${MAX_RETRIES} attempts (last: HTTP ${HTTP_CODE})"
              exit 1
            fi

            echo "⏳ Attempt ${i}/${MAX_RETRIES}: HTTP ${HTTP_CODE}, retrying in ${RETRY_DELAY}s..."
            sleep "$RETRY_DELAY"
          done

      # ── OPEN NEXT ENV ISSUE (if chain continues) ──────────
      - name: Open next environment issue
        if: success() && env.REMAINING_CHAIN != ''
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          STAGING_URL: ${{ secrets.STAGING_URL }}
          RUN_URL:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          NEXT_ENV=$(echo "$REMAINING_CHAIN" | cut -d',' -f1)
          NEXT_REMAINING=$(echo "$REMAINING_CHAIN" | cut -d',' -f2-)
          [[ "$NEXT_ENV" == "$NEXT_REMAINING" ]] && NEXT_REMAINING=""

          {
            echo "## Deploy Request"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Version**             | \`${VERSION}\` |"
            echo "| **Target**              | **${NEXT_ENV^^}** |"
            echo "| **Type**                | \`${RELEASE_TYPE}\` |"
            echo "| **Image**               | \`${IMAGE}\` |"
            echo "| **Staging approved by** | @${APPROVED_BY} |"
            echo "| **Staging deployed**    | $(date -u '+%Y-%m-%d %H:%M UTC') |"
            echo "| **Staging logs**        | [View](${RUN_URL}) |"
            echo ""
            echo "---"
            echo ""
            echo "### Staging Status"
            echo ""
            echo "✅ Staging deployment successful — health check passed."
            echo ""
            echo "🔗 Review at staging: ${STAGING_URL}"
            echo ""
            echo "---"
            echo ""
            echo "### How to Approve"
            echo ""
            echo "| Command | Action |"
            echo "|---|---|"
            echo "| \`/approve\` | ✅ Deploy to **${NEXT_ENV^^}** |"
            echo "| \`/reject [reason]\` | 🚫 Cancel deployment |"
            echo ""
            echo "> ⚠️ Only authorized approvers in \`.github/approvers.yml\` can use these commands."
            echo ""
            echo "<!-- deploy-meta"
            echo "version: ${VERSION}"
            echo "release_type: ${RELEASE_TYPE}"
            echo "branch: ${BRANCH}"
            echo "image: ${IMAGE}"
            echo "environment: ${NEXT_ENV}"
            echo "remaining_chain: ${NEXT_REMAINING}"
            echo "-->"
          } > /tmp/next-issue.md

          ISSUE_URL=$(gh issue create \
            --title "🚀 Deploy ${VERSION} → ${NEXT_ENV^^}" \
            --body-file /tmp/next-issue.md \
            --label "pending-${NEXT_ENV}")

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Staging deployed: ${VERSION}"
          echo "  📋 Next approval (${NEXT_ENV}): ${ISSUE_URL}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── NOTIFY ON FAILURE ──────────────────────────────────
      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"❌ *Staging deploy FAILED* — \`${VERSION}\`\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"Version\",     \"value\": \"\`${VERSION}\`\",   \"short\": true},
                  {\"title\": \"Approved by\", \"value\": \"@${APPROVED_BY}\", \"short\": true},
                  {\"title\": \"Logs\",        \"value\": \"<${RUN_URL}|View logs>\"}
                ]
              }]
            }"

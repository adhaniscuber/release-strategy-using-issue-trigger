# ============================================================
# approvers.yml — Authorized approvers per environment
#
# Used by on-issue-comment.yml to validate /approve and /reject
# commands on deployment issues.
#
# ── HOW IT WORKS ────────────────────────────────────────────
# • When /approve or /reject is commented on a pending-<env>
#   issue, the commenter's username is checked against this list.
# • If no list is defined for the env, the 'default' list is
#   used as fallback.
# • Usernames are case-insensitive.
#
# ── DEVELOPMENT ─────────────────────────────────────────────
# Development deploys automatically — this list is NOT used.
# Approval for development is bypassed entirely in release.yml.
#
# ── ADDING A NEW ENVIRONMENT ────────────────────────────────
# Add a new key matching the environment name. No workflow
# changes needed.
# ============================================================

# Auto-deploy — approval bypassed, this list is not consulted.
development: []

# 1 approval required — any engineer can approve.
staging:
  - adhaniscuber
  - prasetiodc17
  - mwfirdaus
  - DioSyahrizal
  - mwrezha

# 1 approval required — tech lead / CTO only.
production:
  - adhaniscuber
  - mwrezha

